name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    outputs:
      ec2_public_ip: ${{ steps.outputs.outputs.ec2_public_ip }}

    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_allowed_ssh_cidr: ${{ secrets.TF_VAR_ALLOWED_SSH_CIDR }}
      TF_VAR_question_app_cidr: ${{ secrets.TF_VAR_QUESTION_APP_CIDR }}
      TF_VAR_submit_app_cidr: ${{ secrets.TF_VAR_SUBMIT_APP_CIDR }}
      TF_VAR_aws_ami_id: ${{ secrets.TF_VAR_AWS_AMI_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
      TF_VAR_public_route_config: '{ cidr_block = "0.0.0.0/0" }'
      TF_VAR_ssh_port: 22
      TF_VAR_question_app_port: 4000
      TF_VAR_submit_app_port: 4200

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Allow SSH from this runner
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n')"
          echo "TF_VAR_allowed_ssh_cidr=${runner_ip}/32" >> "$GITHUB_ENV"
          echo "GitHub runner SSH CIDR: ${runner_ip}/32"

      - name: Validate SSH public key secret
        run: |
          if [[ "$TF_VAR_ssh_public_key" == "~/"* || "$TF_VAR_ssh_public_key" == "/"* ]]; then
            echo "TF_VAR_SSH_PUBLIC_KEY must contain the public key text, not a file path."
            exit 1
          fi

      - name: Import existing infrastructure
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          set -euo pipefail

          import_if_missing() {
            local address="$1"
            local id="$2"

            if [[ -z "$id" || "$id" == "None" ]]; then
              echo "No existing ${address} found to import."
              return 0
            fi

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "${address} already in Terraform state."
              return 0
            fi

            terraform import "$address" "$id"
          }

          sg_id="$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=quizx-sg" "Name=tag:Name,Values=quizx-web" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)"

          if [[ -n "$sg_id" && "$sg_id" != "None" ]]; then
            vpc_id="$(aws ec2 describe-security-groups \
              --group-ids "$sg_id" \
              --query 'SecurityGroups[0].VpcId' \
              --output text)"
          else
            vpc_id="$(aws ec2 describe-vpcs \
              --filters "Name=cidr-block,Values=10.0.0.0/16" "Name=is-default,Values=false" \
              --query 'Vpcs[0].VpcId' \
              --output text)"
          fi

          import_if_missing aws_vpc.main "$vpc_id"

          subnet_id="$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${vpc_id}" "Name=cidr-block,Values=10.0.1.0/24" \
            --query 'Subnets[0].SubnetId' \
            --output text)"
          import_if_missing aws_subnet.public "$subnet_id"

          igw_id="$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=${vpc_id}" \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text)"
          import_if_missing aws_internet_gateway.igw "$igw_id"

          route_table_id="$(aws ec2 describe-route-tables \
            --filters "Name=association.subnet-id,Values=${subnet_id}" \
            --query 'RouteTables[0].RouteTableId' \
            --output text)"
          import_if_missing aws_route_table.public "$route_table_id"

          import_if_missing aws_route_table_association.public_assoc "${subnet_id}/${route_table_id}"
          import_if_missing aws_security_group.quizx_sg "$sg_id"

          instance_id="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=quizx-web" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"
          import_if_missing aws_instance.web "$instance_id"

      - name: Terraform apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: outputs
        if: ${{ inputs.terraform_action == 'apply' }}
        run: |
          ec2_public_ip="$(terraform output -raw ec2_public_ip)"
          echo "ec2_public_ip=${ec2_public_ip}" >> "$GITHUB_OUTPUT"

      - name: Terraform destroy
        if: ${{ inputs.terraform_action == 'destroy' }}
        run: terraform destroy -auto-approve

  deploy:
    if: ${{ inputs.terraform_action == 'apply' }}
    needs: terraform
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ needs.terraform.outputs.ec2_public_ip }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME || 'ubuntu' }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Allow SSH from deploy runner
        run: |
          set -euo pipefail

          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n')"
          sg_id="$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=quizx-sg" "Name=tag:Name,Values=quizx-web" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)"

          aws ec2 authorize-security-group-ingress \
            --group-id "$sg_id" \
            --protocol tcp \
            --port 22 \
            --cidr "${runner_ip}/32" 2>/tmp/authorize-ssh-error.log || {
              if grep -q InvalidPermission.Duplicate /tmp/authorize-ssh-error.log; then
                echo "SSH access already allowed for ${runner_ip}/32"
              else
                cat /tmp/authorize-ssh-error.log
                exit 1
              fi
            }

      - name: Configure SSH key
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/quizx-ec2
          chmod 600 ~/.ssh/quizx-ec2

          for attempt in {1..12}; do
            if ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            echo "Waiting for SSH on ${EC2_HOST}... attempt ${attempt}/12"
            sleep 10
          done

          echo "SSH is not reachable on ${EC2_HOST}:22"
          exit 1

      - name: Package application
        run: |
          tar \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='infra/terraform/.terraform' \
            --exclude='infra/terraform/terraform.tfstate*' \
            -czf /tmp/quizx.tar.gz .

      - name: Copy application to EC2
        run: |
          scp -i ~/.ssh/quizx-ec2 /tmp/quizx.tar.gz "${EC2_USERNAME}@${EC2_HOST}:/tmp/quizx.tar.gz"

      - name: Deploy Docker Compose app
        run: |
          ssh -i ~/.ssh/quizx-ec2 "${EC2_USERNAME}@${EC2_HOST}" <<'REMOTE'
            set -euo pipefail

            sudo apt-get update
            sudo apt-get install -y docker.io
            if ! sudo docker compose version >/dev/null 2>&1; then
              sudo apt-get install -y docker-compose-v2
            fi
            sudo systemctl enable --now docker

            if ! swapon --show | grep -q /swapfile; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              if ! grep -q '^/swapfile ' /etc/fstab; then
                echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              fi
            fi

            sudo mkdir -p /opt/quizx
            sudo chown "$USER":"$USER" /opt/quizx
            tar -xzf /tmp/quizx.tar.gz -C /opt/quizx

            cd /opt/quizx
            sudo docker compose -f infra/docker/docker-compose.yml up -d --build
            sudo docker compose -f infra/docker/docker-compose.yml ps
          REMOTE
