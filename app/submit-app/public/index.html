<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizX Submit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-bar">
            <h1>QuizX Submit</h1>
            <p>version 1.0.0</p>
        </header>

        <main class="page-body">
            <section class="title-row">
                <h2>Submit New Question</h2>
            </section>

            <form id="submit-form" class="submit-form">
                <section class="form-panel" aria-label="Submit question form">
                    <div class="question-side">
                        <label class="question-field">
                            <span class="sr-only">Question</span>
                            <textarea id="question" name="question" rows="2" required>What is the chemical symbol for gold?</textarea>
                        </label>

                        <div class="options-panel">
                            <div class="options-heading">
                                <p>Add 4 Options for the questions:</p>
                                <p>Choose answer</p>
                            </div>

                            <div id="option-list" class="option-list">
                                <div class="option-row">
                                    <input class="option-input" name="option" type="text" value="AU" aria-label="Option 1" required>
                                    <label class="answer-switch">
                                        <input name="answer" type="radio" value="0" required>
                                        <span class="switch-track"><span class="switch-handle"></span></span>
                                        <span class="sr-only">Mark option 1 as correct</span>
                                    </label>
                                </div>
                                <div class="option-row">
                                    <input class="option-input" name="option" type="text" value="Ag" aria-label="Option 2" required>
                                    <label class="answer-switch">
                                        <input name="answer" type="radio" value="1">
                                        <span class="switch-track"><span class="switch-handle"></span></span>
                                        <span class="sr-only">Mark option 2 as correct</span>
                                    </label>
                                </div>
                                <div class="option-row">
                                    <input class="option-input" name="option" type="text" value="Fe" aria-label="Option 3" required>
                                    <label class="answer-switch">
                                        <input name="answer" type="radio" value="2">
                                        <span class="switch-track"><span class="switch-handle"></span></span>
                                        <span class="sr-only">Mark option 3 as correct</span>
                                    </label>
                                </div>
                                <div class="option-row">
                                    <input class="option-input" name="option" type="text" value="Pb" aria-label="Option 4" required>
                                    <label class="answer-switch">
                                        <input name="answer" type="radio" value="3">
                                        <span class="switch-track"><span class="switch-handle"></span></span>
                                        <span class="sr-only">Mark option 4 as correct</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <aside class="category-side" aria-label="Category controls">
                        <p>Add New Category</p>

                        <label class="category-control">
                            <span class="sr-only">Choose Category</span>
                            <select id="category-select" name="category" aria-label="Choose Category">
                                <option value="">Choose Category</option>
                            </select>
                        </label>

                        <span class="or-label">Or</span>

                        <label class="new-category-control">
                            <span>Add New Category</span>
                            <input id="new-category" name="newCategory" type="text" placeholder="Label">
                        </label>
                    </aside>
                </section>

                <p id="form-message" class="form-message" role="status" aria-live="polite"></p>

                <footer class="action-row">
                    <button class="clear-button" id="clear-button" type="reset">Clear</button>
                    <button class="submit-button" type="submit">Submit</button>
                </footer>
            </form>
        </main>
    </div>
</body>
</html>
