<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizX Questions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-bar">
            <h1>QuizX Questions</h1>
            <p>version 1.0.0</p>
        </header>

        <main class="page-body">
            <section class="toolbar" aria-label="Quiz controls">
                <div class="selected-category">
                    <span>Category :</span>
                    <strong id="selected-category">Science</strong>
                </div>

                <div class="config-controls">
                    <label class="category-control">
                        <span class="sr-only">Choose Category</span>
                        <select id="category-select" aria-label="Choose Category">
                            <option value="Science">Science</option>
                        </select>
                    </label>

                    <label class="question-count-field">
                        <span>Num of questions</span>
                        <input id="question-count" type="number" min="1" value="5" inputmode="numeric">
                    </label>

                    <button class="restart-button" id="restart-button" type="button">Restart</button>
                </div>
            </section>

            <section id="question-container" class="questions-grid" aria-live="polite"></section>
        </main>
    </div>
</body>
</html>
